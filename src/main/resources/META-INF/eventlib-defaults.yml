eventlib:
  infra:
    rabbitmq:
      exchange: eventlib.exchange
      dlq:
        suffix: .dlq
      queues: {}

    redis:
      enabled: true
      idempotency-prefix: eventlib:idempotency

    outbox:
      enabled: false
